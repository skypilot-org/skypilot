resources:
  cloud: kubernetes
  cpus: 1+
  memory: 2+

setup: |
  cat > /tmp/parent.py <<'PY'
  # Forks two multiprocessing.spawn workers, records their PIDs and its own
  # to the files named on argv, then sleeps. When this parent is SIGKILLed
  # the workers are orphaned and reparent to the subreaper bash.
  import multiprocessing
  import os
  import sys
  import time

  def child():
      time.sleep(86400)

  if __name__ == "__main__":
      parent_file, child_file = sys.argv[1], sys.argv[2]
      ctx = multiprocessing.get_context("spawn")
      procs = [ctx.Process(target=child) for _ in range(2)]
      for p in procs:
          p.start()
      with open(child_file, "w") as f:
          for p in procs:
              f.write(str(p.pid) + chr(10))
      with open(parent_file, "w") as f:
          f.write(str(os.getpid()) + chr(10))
      time.sleep(86400)
  PY

run: |
  # Two orphan topologies, one cluster, so both _process_group_orphaned
  # branches are exercised:
  #  - job control ON (default `bash -i`): `&` puts the parent in its OWN
  #    process group; a killed parent leaves an orphaned (dead-leader) group.
  #  - job control OFF (`set +m`, the non-interactive shell used on VMs): the
  #    parent stays in the run-block shell's OWN group, whose leader (the
  #    watched process) is still alive.
  # The reaper must clean up the orphaned workers in BOTH cases.
  python3 /tmp/parent.py /tmp/parent_on.txt /tmp/child_on.txt > /tmp/on.log 2>&1 &
  set +m
  python3 /tmp/parent.py /tmp/parent_off.txt /tmp/child_off.txt > /tmp/off.log 2>&1 &
  set -m
  sleep 86400
