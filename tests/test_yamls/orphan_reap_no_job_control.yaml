resources:
  cloud: kubernetes
  cpus: 1+
  memory: 2+

setup: |
  cat > /tmp/parent.py <<'PY'
  # Same SIGKILL-orphan repro as orphan_reap_sigkill.yaml, but the run block
  # disables job control so the workers land in the run-block shell's OWN
  # process group (the non-interactive-shell topology used on VMs) rather
  # than in their own job-control group.
  import multiprocessing
  import os
  import time

  def child():
      time.sleep(86400)

  if __name__ == "__main__":
      ctx = multiprocessing.get_context("spawn")
      procs = [ctx.Process(target=child) for _ in range(2)]
      for p in procs:
          p.start()
      with open("/tmp/child_pids.txt", "w") as f:
          for p in procs:
              f.write(str(p.pid) + chr(10))
      with open("/tmp/parent_pid.txt", "w") as f:
          f.write(str(os.getpid()) + chr(10))
      time.sleep(86400)
  PY

run: |
  # `set +m` turns OFF job control, so `&` does NOT put parent.py in its own
  # process group — it stays in this shell's group. A killed-parent orphan
  # then shares the watched process's own process group (pgid == proc pgid),
  # the case the bash -i (pod) reaping tests do not exercise.
  set +m
  python3 /tmp/parent.py > /tmp/parent.log 2>&1 &
  sleep 86400
