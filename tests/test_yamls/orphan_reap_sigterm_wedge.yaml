resources:
  cloud: kubernetes
  cpus: 1+
  memory: 2+

setup: |
  cat > /tmp/parent.py <<'PY'
  # SIGTERM-wedge repro: parent installs a SIGTERM handler that raises
  # KeyboardInterrupt and then sits in a place that never returns
  # (signal.pause). This is the failure mode users hit when an
  # application's init-time signal handler is unsafe: SIGTERM lands
  # mid-syscall, the exception propagates into an except-block that
  # wedges, and the application sits alive forever holding its
  # resources (GPU contexts in the original report, but the mechanism
  # is resource-agnostic).
  #
  # Two os.fork() children — no multiprocessing module, so there's no
  # internal reaper thread quietly waiting on them:
  #   - "worker": sleeps forever (like a model worker holding a GPU)
  #   - "helper": exits after 4s. Because the wedged parent never
  #     calls wait(), this child becomes a zombie under the wedged
  #     parent — the signal that the daemon's wedge sweep looks for.
  import os
  import signal
  import sys
  import time

  def _interrupt(*_):
      raise KeyboardInterrupt("terminated")

  signal.signal(signal.SIGTERM, _interrupt)

  worker = os.fork()
  if worker == 0:
      time.sleep(86400)
      sys.exit(0)

  helper = os.fork()
  if helper == 0:
      time.sleep(4)
      sys.exit(0)

  with open("/tmp/parent_pid.txt", "w") as f:
      f.write(str(os.getpid()) + chr(10))
  with open("/tmp/child_pids.txt", "w") as f:
      f.write(str(worker) + chr(10) + str(helper) + chr(10))

  try:
      time.sleep(300)
  except KeyboardInterrupt:
      signal.pause()  # wedge forever
  PY

run: |
  python3 /tmp/parent.py > /tmp/parent.log 2>&1 &
  sleep 86400
