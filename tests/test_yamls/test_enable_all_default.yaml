resources:
  cpus: 0.1+
  infra: kubernetes

num_nodes: 1

run: |
  set -ex
  mkdir -p sky_workdir/dev
  cat >> sky_workdir/dev/Dockerfile <<'EOF'
  FROM alpine
  RUN echo "test"
  CMD ["echo", "hello from DinD"]
  EOF
  docker build -t hello:test -f sky_workdir/dev/Dockerfile sky_workdir/dev
  docker run --rm hello:test cat /etc/os-release
  docker info
  docker images

config:
  kubernetes:
    enable_docker: true
