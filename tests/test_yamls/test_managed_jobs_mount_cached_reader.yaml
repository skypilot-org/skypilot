# Reader half of the managed-jobs MOUNT_CACHED flush-on-exit test:
# mounts the bucket the writer wrote to just before exiting and prints
# the marker; the test greps the job logs for it.
envs:
  TEST_BUCKET: ""

file_mounts:
  /mnt/data:
    name: ${TEST_BUCKET}
    mode: MOUNT

run: |
  set -ex
  cat /mnt/data/flush-marker.txt
