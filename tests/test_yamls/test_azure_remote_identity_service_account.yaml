config:
  azure:
    remote_identity: SERVICE_ACCOUNT

run: |
  echo "Testing remote_identity with SERVICE_ACCOUNT"
  # Check that Azure credentials were NOT uploaded
  if [ -f ~/.azure/azureProfile.json ]; then
    echo "ERROR: ~/.azure/azureProfile.json should not exist with SERVICE_ACCOUNT"
    exit 1
  else
    echo "SUCCESS: Azure credentials not uploaded as expected"
  fi
  # Verify the VM has a managed identity by querying Azure IMDS
  # (Instance Metadata Service at link-local 169.254.169.254).
  # A non-empty access_token confirms the managed identity is attached.
  TOKEN=$(curl -s -H "Metadata:true" \
    "http://169.254.169.254/metadata/identity/oauth2/token?api-version=2018-02-01&resource=https://management.azure.com/" \
    | python3 -c "import sys,json; print(json.load(sys.stdin).get('access_token',''))")
  if [ -n "$TOKEN" ]; then
    echo "SUCCESS: Managed identity token obtained"
  else
    echo "ERROR: Could not obtain managed identity token"
    exit 1
  fi
