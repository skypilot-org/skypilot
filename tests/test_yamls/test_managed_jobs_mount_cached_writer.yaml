# Writer half of the managed-jobs MOUNT_CACHED flush-on-exit test: the
# write below is the job's last command, so only the post-run flush wait
# stands between it and instance teardown (rclone uploads the VFS cache
# asynchronously). The reader yaml then asserts the marker reached the
# bucket.
envs:
  TEST_BUCKET: ""
  MARKER: ""

file_mounts:
  /mnt/cached:
    name: ${TEST_BUCKET}
    mode: MOUNT_CACHED

run: |
  set -ex
  echo "${MARKER}" > /mnt/cached/flush-marker.txt
