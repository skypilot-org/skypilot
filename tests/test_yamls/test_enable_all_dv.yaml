resources:
  cpus: 0.1+
  infra: kubernetes
  image_id: docker:ubuntu:22.04

num_nodes: 1

volumes:
  /mnt/data0: docker-all-vol0

run: |
  set -ex
  mkdir -p sky_workdir/dev
  cat >> sky_workdir/dev/Dockerfile <<'EOF'
  FROM alpine
  RUN echo "test"
  CMD ["echo", "hello from DinD"]
  EOF
  docker build -t hello:test -f sky_workdir/dev/Dockerfile sky_workdir/dev
  docker run --rm hello:test cat /etc/os-release
  docker info
  docker images

config:
  kubernetes:
    enable_docker:
      mode: ALL
      cache_volume: docker-all-vol1
