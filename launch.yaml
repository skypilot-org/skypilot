# Example config combining all three load modes against a remote API server.
#
# Run with:
#   python tests/load_tests/benchmark_ctl.py \
#       --config tests/load_tests/configs/mixed.yaml \
#       --target-endpoint http://user:pass@your-api-server
#
# Notes
# - For HTTP basic auth, embed user:pass@ in the endpoint URL.
# - For service-account auth, set target.service_account_token (sky_...).
# - QPS target_qps is GLOBAL: it is split evenly across worker VMs.

target:
  endpoint: "http://CHANGE_ME"
  service_account_token: null
  cloud: kubernetes

workers:
  count: 8
  cloud: aws
  cpus: 8
  memory: 16
  use_go_client: false
  reuse: true
  cleanup: false

# Wall-clock fence for QPS + long_conn generators. Shell generators run to
# completion bounded by their own timeout_per_run_s.
duration_s: 600

victim_pool:
  enabled: true
  count: 1
  cloud: kubernetes
  cpus: 8
  memory: 16
  name_prefix: bench-victim
  provision: true
  teardown: false

generators:
  # Heavy lifecycle pressure (slow, closed-loop). Optional — uncomment to
  # layer it on top of the other generators.
  - name: shell-lifecycle
    type: shell
    workload: workloads/basic.sh
    threads_per_worker: 8
    repeats: 2
    phases: [cluster]
    timeout_per_run_s: 3600

  - name: api-read-qps
    type: qps
    target_qps: 40
    operations:
      - {op: status,        weight: 7}
      - {op: cluster_queue, weight: 1}
      - {op: tail_logs,     weight: 2}

  # Concurrent long-lived sessions to victims.
  - name: long-connections
    type: long_conn
    health_check_interval_s: 30
    reconnect_on_drop: true
    protocols:
      - kind: ssh_idle
        connections_per_worker: 10
      - kind: logs_follow
        connections_per_worker: 10

  # Connect-latency benchmark. Each op spawns `concurrency_per_worker`
  # threads that repeatedly open + close one session to a victim cluster
  # and record the wall-clock duration. `total_connections` is the global
  # target per op (split evenly across workers); 0 = unlimited, bounded
  # by `duration_s`.
  #   - kind=ssh        → raw `ssh <victim> true` (measures the API
  #                       server's SSH proxy path end-to-end)
  #   - kind=sky_logs   → `sky logs <victim> --no-follow` via SDK
  #                       (measures the /logs endpoint)
