name: Publish Helm Charts

# Do not change this
concurrency: publish-helm-${{ inputs.release_environment || 'production' }}

env:
  HELM_REPO_URL: https://helm.skypilot.co

permissions:
  contents: write
  pages: write

on:
  workflow_call:
    inputs:
      version:
        description: "Version to set in Chart.yaml"
        required: false
        type: string
      commit_message:
        description: "Git commit message"
        required: false
        type: string
      package_name:
        description: "Package name to use as chart name and docker image name"
        required: false
        type: string
        default: "skypilot-nightly"
      release_environment:
        description: "Release environment: production or staging"
        required: false
        type: string
        default: "production"
      docker_image:
        description: "Docker image to reference in values.yaml (e.g. berkeleyskypilot/skypilot). Defaults to DOCKER_USERNAME/package_name."
        required: false
        type: string
    secrets:
      DOCKER_USERNAME:
        required: true
      HELM_DEPLOY_KEY:
        required: true
  workflow_dispatch:
    inputs:
      version:
        description: "Version to set in Chart.yaml"
        required: false
        type: string
      commit_message:
        description: "Git commit message"
        required: false
        type: string
        default: "Updated from ref: $GITHUB_SHA"
      package_name:
        description: "Package name to use as chart name and docker image name"
        required: false
        type: string
        default: "skypilot-nightly"
      release_environment:
        description: "Release environment: production or staging"
        required: false
        type: string
        default: "production"
      docker_image:
        description: "Docker image to reference in values.yaml (e.g. berkeleyskypilot/skypilot). Defaults to DOCKER_USERNAME/package_name."
        required: false
        type: string
    secrets:
      DOCKER_USERNAME:
        required: true
      HELM_DEPLOY_KEY:
        required: true

jobs:
  publish-helm:
    # Skip if triggered by release workflow
    if: ${{ !contains(github.event.head_commit.message, 'Release version') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3.6.0
        with:
          path: 'src'
          fetch-depth: 0

      - name: Resolve helm target (single source of truth for release_environment)
        id: helm_target
        run: |
          if [ "${{ inputs.release_environment }}" == "staging" ]; then
            echo "branch=test" >> $GITHUB_OUTPUT
            echo "url=https://raw.githubusercontent.com/skypilot-org/skypilot-helm/test" >> $GITHUB_OUTPUT
          else
            echo "branch=main" >> $GITHUB_OUTPUT
            echo "url=${{ env.HELM_REPO_URL }}" >> $GITHUB_OUTPUT
          fi

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.HELM_DEPLOY_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          cat >> ~/.ssh/config << EOF
          Host github.com
            IdentityFile ~/.ssh/deploy_key
            StrictHostKeyChecking no
          EOF

      - name: Checkout Helm Repository
        uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3.6.0
        with:
          path: 'dest'
          repository: 'skypilot-org/skypilot-helm'
          ssh-key: ${{ secrets.HELM_DEPLOY_KEY }}
          ref: ${{ steps.helm_target.outputs.branch }}
          fetch-depth: 0

      - name: Reset test branch to current main (staging only)
        if: inputs.release_environment == 'staging'
        working-directory: dest
        run: |
          # Staging publishes always start from a clean copy of main, so the
          # test branch ends up as exactly "main + one staging chart". This
          # avoids accumulating cruft across runs and avoids the staging
          # index.yaml inheriting old production .tgz files.
          git fetch origin main
          git reset --hard origin/main
          rm -f *.tgz index.yaml

      - name: Install Helm
        uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4.3.1

      - name: Update Chart Version and Name
        if: inputs.version != ''
        run: |
          version="${{ inputs.version }}"
          # Convert PEP440 version to SemVer if needed for Helm versioning
          # Handle cases like:
          #   1.0.0.dev20250218 -> 1.0.0-dev.20250218
          #   0.11.0rc0 -> 0.11.0-rc.0
          #   0.11.0a1 -> 0.11.0-alpha.1
          #   0.11.0b2 -> 0.11.0-beta.2
          #   0.11.0.post1 -> 0.11.0+post.1
          semversion=$(echo "$version" | sed -E 's/([0-9]+\.[0-9]+\.[0-9]+)\.dev([0-9]+)/\1-dev.\2/')
          semversion=$(echo "$semversion" | sed -E 's/([0-9]+\.[0-9]+\.[0-9]+)rc([0-9]+)/\1-rc.\2/')
          semversion=$(echo "$semversion" | sed -E 's/([0-9]+\.[0-9]+\.[0-9]+)a([0-9]+)/\1-alpha.\2/')
          semversion=$(echo "$semversion" | sed -E 's/([0-9]+\.[0-9]+\.[0-9]+)b([0-9]+)/\1-beta.\2/')
          # Post-releases use build metadata (+) since SemVer has no direct equivalent to PEP440's .post
          # PEP440 .post means "after release", but SemVer build metadata has same precedence.
          # TODO(romilb): If both 0.11.0 and 0.11.0+post.1 exist, Helm's "latest" behavior is undefined - some sources claim the newer one wins. Need to verify this.
          semversion=$(echo "$semversion" | sed -E 's/([0-9]+\.[0-9]+\.[0-9]+)\.post([0-9]+)/\1+post.\2/')

          # Update the version and name in the main skypilot chart
          sed -i "s/^version:.*$/version: ${semversion}/" src/charts/skypilot/Chart.yaml
          sed -i "s/^appVersion:.*$/appVersion: ${version}/" src/charts/skypilot/Chart.yaml
          sed -i "s/^name:.*$/name: ${{ inputs.package_name }}/" src/charts/skypilot/Chart.yaml
          # Copy the non-HTML content from the README.md of root directory to the skypilot chart
          line=$(grep -n "^-----*$" src/README.md | cut -d: -f1 | head -n 1)
          tail -n +$line src/README.md >> src/charts/skypilot/README.md

      - name: Update docker image in charts
        if: inputs.version != ''
        run: |
          # Compute the docker image reference
          if [ -n "${{ inputs.docker_image }}" ]; then
            DOCKER_IMG="${{ inputs.docker_image }}"
          else
            DOCKER_IMG="${{ secrets.DOCKER_USERNAME }}/${{ inputs.package_name }}"
          fi
          # Update the apiService.image in values.yaml using yq
          yq -i ".apiService.image = \"${DOCKER_IMG}:${{ inputs.version }}\"" src/charts/skypilot/values.yaml
          # Print the new values.yaml for debugging
          cat src/charts/skypilot/values.yaml

      - name: Package Helm Charts
        shell: bash
        run: |
          find src/charts/ -type f -name 'Chart.yaml' | sed -r 's|/[^/]+$||' | sort | uniq | xargs -L 1 helm dep up
          for d in src/charts/*/ ; do
              echo "$d"
              helm package "$d" -u -d dest
          done

      - name: Push New Files
        shell: bash
        working-directory: dest
        env:
          TARGET_BRANCH: ${{ steps.helm_target.outputs.branch }}
          TARGET_URL: ${{ steps.helm_target.outputs.url }}
          RELEASE_ENV: ${{ inputs.release_environment }}
        run: |
          # Safety guard: production releases must push to main; staging must push
          # to test. A mismatch means a conditional somewhere drifted — fail loud
          # rather than risk overwriting helm.skypilot.co with staging content.
          if [ "$RELEASE_ENV" = "staging" ] && [ "$TARGET_BRANCH" != "test" ]; then
            echo "Refusing to push: staging release resolved to branch '$TARGET_BRANCH'"
            exit 1
          fi
          if [ "$RELEASE_ENV" != "staging" ] && [ "$TARGET_BRANCH" != "main" ]; then
            echo "Refusing to push: production release resolved to branch '$TARGET_BRANCH'"
            exit 1
          fi

          helm repo index . --url "$TARGET_URL"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Add both untracked files and .tgz files explicitly
          git add $(git ls-files -o --exclude-standard)
          git add *.tgz
          git add index.yaml
          # Show what's being committed for debugging
          git status
          git commit -m "${{ inputs.commit_message || format('Updated from ref: {0}', github.sha) }}"
          if [ "$RELEASE_ENV" = "staging" ]; then
            # Test branch was reset to main earlier, so force-push is required
            # and intentional — it keeps the branch at "main + one staging chart".
            git push --force origin "$TARGET_BRANCH"
          else
            git push origin "$TARGET_BRANCH"
          fi
