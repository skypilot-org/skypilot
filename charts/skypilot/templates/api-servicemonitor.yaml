{{- /*
  Prometheus Operator ServiceMonitor for the SkyPilot API server.

  Prerequisite: prometheus-operator CRDs (`monitoring.coreos.com/v1`)
  installed on the cluster — typically via kube-prometheus-stack. Without
  the Operator, this template renders a resource the apiserver will reject.

  Opt-in: defaults to disabled so vanilla-Prometheus users (pod scrape
  annotations on api-deployment.yaml) keep working unchanged.
*/ -}}
{{- if and .Values.apiService.metrics.enabled .Values.apiService.metrics.serviceMonitor.enabled }}
{{- $fullName := include "skypilot.fullname" . -}}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ $fullName }}-api
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ $fullName }}-api
    {{- with .Values.apiService.metrics.serviceMonitor.additionalLabels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  selector:
    matchLabels:
      # Match the Service emitted by api-service.yaml — the `app:` label
      # there is identical to this fullName-derived value.
      app: {{ $fullName }}-api
  namespaceSelector:
    matchNames:
      - {{ .Release.Namespace }}
  endpoints:
    - port: metrics
      path: /metrics
      interval: {{ .Values.apiService.metrics.serviceMonitor.interval }}
      scrapeTimeout: {{ .Values.apiService.metrics.serviceMonitor.scrapeTimeout }}
    {{- with .Values.apiService.metrics.serviceMonitor.gpuMetricsPath }}
    - port: metrics
      path: {{ . }}
      # /gpu-metrics is a federated scrape (port-forwards per K8s
      # context) — keep the cadence loose. Tighter intervals just queue
      # up backpressure on the API server side without giving more data.
      interval: 60s
      scrapeTimeout: {{ $.Values.apiService.metrics.serviceMonitor.scrapeTimeout }}
    {{- end }}
{{- end }}
