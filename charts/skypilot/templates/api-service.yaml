{{- $fullName := include "skypilot.fullname" . -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ $fullName }}-api-service
  namespace: {{ .Release.Namespace }}
  # Service-level label so the optional ServiceMonitor (api-servicemonitor.yaml)
  # can select this Service by metadata. The `app:` under spec.selector below
  # is the pod selector and is NOT visible to ServiceMonitor matching.
  labels:
    app: {{ $fullName }}-api
spec:
  type: ClusterIP  # Use clusterIP to allow ingress to authenticate
  ports:
    - port: 80
      name: http
      targetPort: 46580  # Assuming your container listens on port 46580
      protocol: TCP
  {{- if .Values.apiService.metrics.enabled }}
    - port: {{ .Values.apiService.metrics.port }}
      name: metrics
      targetPort: {{ .Values.apiService.metrics.port }}
      protocol: TCP
  {{- end }}
  selector:
    app: {{ $fullName }}-api
    skypilot.co/ready: "true"
