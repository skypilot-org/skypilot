name: opencode-agent

resources:
  cpus: 2+

envs:
  GITHUB_REPO: ""
  LLM_MODEL_ID: "anthropic/claude-sonnet-4-6"

secrets:
  GITHUB_TOKEN: null
  ANTHROPIC_API_KEY: null

setup: |
  sudo curl -fsSL https://deb.nodesource.com/setup_22.x | sudo bash -
  sudo apt-get install -y nodejs
  sudo npm install -g opencode-ai

run: |
  WORKSPACE="/tmp/opencode-workspace"
  rm -rf "$WORKSPACE"
  git clone --depth=1 \
    "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPO}.git" "$WORKSPACE"
  cd "$WORKSPACE"

  _GH_USER=$(curl -fsSL -H "Authorization: Bearer ${GITHUB_TOKEN}" https://api.github.com/user)
  git config user.name "$(echo "$_GH_USER" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('name') or d['login'])")"
  git config user.email "$(echo "$_GH_USER" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('email') or '{}+{}@users.noreply.github.com'.format(d['id'],d['login']))")"

  opencode web --hostname 0.0.0.0 --port 8080
