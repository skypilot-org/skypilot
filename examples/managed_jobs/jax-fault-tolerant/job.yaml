resources:
  cpus: 0.5
  memory: 1
  cloud: kubernetes
  job_recovery:
    strategy: DYNAMIC_NODE_SET
    min_nodes: 3

num_nodes: 5

envs:
  NUM_EPOCHS: 50
  STEPS_PER_EPOCH: 20

workdir:
  url: https://github.com/skypilot-org/skypilot.git
  ref: speedup-job

setup: |
  pip install jax jaxlib

run: |
  cd examples/managed_jobs/jax-fault-tolerant
  python train.py
