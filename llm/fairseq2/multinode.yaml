# Fairseq2: Multi-node Distributed Training on SkyPilot
#
# This example runs distributed instruction fine-tuning across multiple nodes
# using fairseq2's built-in support for FSDP and tensor parallelism.
#
# Usage:
#   sky launch -c fairseq2-multi llm/fairseq2/multinode.yaml --secret HF_TOKEN
#
# Scale to more nodes:
#   sky launch -c fairseq2-multi llm/fairseq2/multinode.yaml --secret HF_TOKEN --num-nodes 4

envs:
  MODEL: llama3_1_8b
  MAX_NUM_STEPS: 2000
  MAX_NUM_TOKENS: 4096
  # Change this to your own checkpoint bucket
  CHECKPOINT_BUCKET_NAME: sky-fairseq2-checkpoints

secrets:
  HF_TOKEN: null  # Pass with `--secret HF_TOKEN` in CLI

resources:
  accelerators: H100:8
  disk_size: 500
  disk_tier: best

num_nodes: 2

file_mounts:
  /output:
    name: $CHECKPOINT_BUCKET_NAME
    mode: MOUNT

setup: |
  # Install system dependencies
  sudo apt-get update
  sudo apt-get install -y libsndfile1

  # Create virtual environment
  uv venv --python 3.11 --seed
  source .venv/bin/activate

  # Install PyTorch and fairseq2
  uv pip install torch torchvision torchaudio
  uv pip install fairseq2

  # Login to HuggingFace for model access
  uv pip install huggingface_hub
  huggingface-cli login --token $HF_TOKEN

run: |
  set -e
  source .venv/bin/activate

  # Extract master address for distributed training
  MASTER_ADDR=$(echo "$SKYPILOT_NODE_IPS" | head -n1)
  MASTER_PORT=29500

  echo "Node rank: $SKYPILOT_NODE_RANK"
  echo "Master address: $MASTER_ADDR:$MASTER_PORT"
  echo "Total nodes: $SKYPILOT_NUM_NODES"
  echo "GPUs per node: $SKYPILOT_NUM_GPUS_PER_NODE"

  OUTPUT_DIR=/output/${MODEL}-multinode-$(date +%Y%m%d-%H%M%S)
  mkdir -p $OUTPUT_DIR

  # Run distributed training with torchrun
  torchrun \
    --nnodes=$SKYPILOT_NUM_NODES \
    --nproc_per_node=$SKYPILOT_NUM_GPUS_PER_NODE \
    --node_rank=$SKYPILOT_NODE_RANK \
    --master_addr=$MASTER_ADDR \
    --master_port=$MASTER_PORT \
    -m fairseq2.recipes.lm.instruction_finetune \
    $OUTPUT_DIR \
    --config \
    model=$MODEL \
    max_num_tokens=$MAX_NUM_TOKENS \
    max_num_steps=$MAX_NUM_STEPS \
    checkpoint_every_n_steps=500 \
    dtype=bfloat16 \
    tensor_parallel_size=$SKYPILOT_NUM_GPUS_PER_NODE

  echo "Distributed training completed! Checkpoints saved to: $OUTPUT_DIR"
