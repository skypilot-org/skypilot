# Fairseq2: Preference Optimization (DPO) on SkyPilot
#
# This example runs Direct Preference Optimization (DPO) training using
# fairseq2's preference optimization recipes.
#
# Usage:
#   sky launch -c fairseq2-dpo llm/fairseq2/dpo.yaml --secret HF_TOKEN
#
# Scale to multiple GPUs with FSDP:
#   sky launch -c fairseq2-dpo llm/fairseq2/dpo.yaml --secret HF_TOKEN --gpus A100:8

envs:
  MODEL: llama3_2_1b
  MAX_NUM_STEPS: 1000
  MAX_NUM_TOKENS: 2048
  DATASET_PATH: /datasets/facebook/fairseq2-lm-gsm8k
  # Change this to your own checkpoint bucket
  CHECKPOINT_BUCKET_NAME: sky-fairseq2-checkpoints

secrets:
  HF_TOKEN: null  # Pass with `--secret HF_TOKEN` in CLI

resources:
  accelerators: A100:4
  disk_size: 200
  disk_tier: best

file_mounts:
  /output:
    name: $CHECKPOINT_BUCKET_NAME
    mode: MOUNT

setup: |
  # Install system dependencies
  sudo apt-get update
  sudo apt-get install -y libsndfile1

  # Create virtual environment
  uv venv --python 3.11 --seed
  source .venv/bin/activate

  # Install PyTorch and fairseq2
  uv pip install torch torchvision torchaudio
  uv pip install fairseq2

  # Install HuggingFace tools
  uv pip install huggingface_hub

  # Login to HuggingFace for model access (if token provided)
  if [ -n "$HF_TOKEN" ]; then
    huggingface-cli login --token $HF_TOKEN
  fi

  # Download the GSM8K dataset formatted for fairseq2
  echo "Downloading fairseq2-lm-gsm8k dataset..."
  sudo mkdir -p $DATASET_PATH
  sudo chown $(whoami) $DATASET_PATH

  # Download all dataset files
  huggingface-cli download facebook/fairseq2-lm-gsm8k \
    --local-dir $DATASET_PATH --local-dir-use-symlinks False

  echo "Dataset download completed."

run: |
  set -e
  source .venv/bin/activate

  OUTPUT_DIR=/output/${MODEL}-dpo-$(date +%Y%m%d-%H%M%S)
  mkdir -p $OUTPUT_DIR

  # Run preference optimization (DPO) on GSM8K preference dataset
  fairseq2 lm preference_finetune $OUTPUT_DIR --config \
    dataset=$DATASET_PATH/dpo_train \
    model=$MODEL \
    max_num_tokens=$MAX_NUM_TOKENS \
    max_num_steps=$MAX_NUM_STEPS \
    checkpoint_every_n_steps=500 \
    dtype=bfloat16

  echo "DPO training completed! Checkpoints saved to: $OUTPUT_DIR"
