# Volume definition for rl-code-execution-sandbox shared policy weights.
#
# This volume is mounted by both the rollout-server and ppo-trainer so the
# trainer can push freshly-updated policy weights back to the rollout-server
# every N steps. Create this volume before launching the job group:
#
#   sky volume apply llm/rl-code-execution-sandbox/rl-code-volume.yaml
#
# Then launch the job group:
#   sky jobs launch llm/rl-code-execution-sandbox/rl-code-jobgroup.yaml

name: rl-code-policy
type: k8s-pvc
size: 50Gi
infra: kubernetes
config:
  access_mode: ReadWriteMany
