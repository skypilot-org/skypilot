# RL Code-Execution Training with Job Groups (sandbox-backed reward)
#
# This example trains an LLM on MBPP-style code-generation tasks using GRPO
# (Group Relative Policy Optimization). The reward is computed by *running the
# model's generated code* against hidden test cases inside SkyPilot Sandboxes:
# isolated, per-pod environments on your own Kubernetes cluster. The reward is
# 1.0 only if every test passes.
#
# Architecture:
#   - data-server (auxiliary): Serves MBPP code prompts + hidden tests
#   - rollout-server (auxiliary, x2): SGLang instances + SGLang router
#   - sandbox-reward-server (auxiliary): Runs each response's code in a sandbox
#     and returns 1.0/0.0 based on whether the tests pass
#   - replay-buffer (auxiliary): Stores experience tuples for sampling
#   - ppo-trainer (primary): Orchestrates GRPO training across multiple nodes
#
# Primary/Auxiliary Behavior:
#   The ppo-trainer is the primary task. When training completes, all auxiliary
#   services (data-server, rollout-server, sandbox-reward-server, replay-buffer)
#   are terminated after a 10-second grace period to ensure clean shutdown.
#
# Requirements:
#   The sandbox-reward-server uses the `sky.sandbox` SDK, which requires the
#   Sandbox feature (SkyPilot Platform) and a reachable API server. Set
#   SKYPILOT_API_SERVER_ENDPOINT (and any auth) in the sandbox-reward-server
#   task's envs so it can create sandboxes on your cluster.
#
# Usage:
#   # First, create the shared volume for policy weight sync:
#   sky volume apply llm/rl-code-execution-sandbox/rl-code-volume.yaml
#
#   # Then launch the job group:
#   sky jobs launch llm/rl-code-execution-sandbox/rl-code-jobgroup.yaml
#
# The components communicate over the job group network using DNS names:
#   - data-server-0.${SKYPILOT_JOBGROUP_NAME}:8000
#   - rollout-server-0.${SKYPILOT_JOBGROUP_NAME}:30000 (SGLang router endpoint)
#   - rollout-server-0.${SKYPILOT_JOBGROUP_NAME}:30001 (SGLang backend 1)
#   - rollout-server-1.${SKYPILOT_JOBGROUP_NAME}:30001 (SGLang backend 2)
#   - sandbox-reward-server-0.${SKYPILOT_JOBGROUP_NAME}:8002
#   - replay-buffer-0.${SKYPILOT_JOBGROUP_NAME}:8003
---
name: rl-code-sandbox
execution: parallel
primary_tasks: [ppo-trainer]
termination_delay: 10s

---
# Data Server: Serves MBPP code prompts + hidden tests
name: data-server
resources:
  cpus: 4
  memory: 16+
  infra: kubernetes

file_mounts:
  /code: llm/rl-code-execution-sandbox/code

setup: |
  uv pip install fastapi uvicorn datasets --system

run: |
  echo "Starting data server..."
  echo "JobGroup: ${SKYPILOT_JOBGROUP_NAME}"
  echo "This server provides code prompts at http://data-server-0.${SKYPILOT_JOBGROUP_NAME}:8000"

  cd /code
  python data_server.py --port 8000

---
# Rollout Servers: Multiple SGLang instances with SGLang router on head node
# Using num_nodes=2 to create rollout-server-0 and rollout-server-1
# Head node (rank 0) runs both SGLang server and SGLang router for load balancing
name: rollout-server
num_nodes: 2
resources:
  accelerators: H100:1
  memory: 32+
  infra: kubernetes
  image_id: docker:lmsysorg/sglang:v0.5.9

envs:
  MODEL_NAME: Qwen/Qwen2.5-0.5B-Instruct

# Shared volume between trainer and rollout-server. The trainer writes
# updated policy weights here every N steps; the rollout-server's SGLang
# reads from the same path via /update_weights_from_disk. Create the
# volume first with: sky volume apply llm/rl-code-execution-sandbox/rl-code-volume.yaml
volumes:
  /shared/policy: rl-code-policy

setup: |
  python -c 'import sglang'
  python -c 'import sglang_router' || python -m pip install sglang-router

run: |
  echo "Starting rollout server with SGLang..."
  echo "JobGroup: ${SKYPILOT_JOBGROUP_NAME}"
  echo "Node rank: ${SKYPILOT_NODE_RANK} / ${SKYPILOT_NUM_NODES}"
  echo "Model: ${MODEL_NAME}"

  # Start SGLang server in background.
  python -m sglang.launch_server \
    --model-path ${MODEL_NAME} \
    --host 0.0.0.0 \
    --port 30001 &
  SGLANG_PID=$!

  # On head node, also run the SGLang router for load balancing
  if [ "${SKYPILOT_NODE_RANK}" == "0" ]; then
    echo "Head node: starting SGLang router..."

    # Build worker URL list for all rollout servers
    WORKER_URLS=""
    for i in $(seq 0 $((SKYPILOT_NUM_NODES - 1))); do
      WORKER_URLS="${WORKER_URLS} http://rollout-server-${i}.${SKYPILOT_JOBGROUP_NAME}:30001"
    done

    echo "Load balancing across:${WORKER_URLS}"
    echo "Router API available at http://rollout-server-0.${SKYPILOT_JOBGROUP_NAME}:30000/v1"

    # Wait for SGLang backends to start
    sleep 60

    python -m sglang_router.launch_router \
      --worker-urls ${WORKER_URLS} \
      --host 0.0.0.0 \
      --port 30000 \
      --policy cache_aware &
    ROUTER_PID=$!

    # Wait for both processes
    wait $SGLANG_PID $ROUTER_PID
  else
    # Worker nodes just run SGLang server
    wait $SGLANG_PID
  fi

---
# Sandbox Reward Server: Runs model-generated code against hidden tests inside
# SkyPilot Sandboxes. Reward = 1.0 if all tests pass (exit_code 0), else 0.0.
name: sandbox-reward-server
resources:
  cpus: 4
  memory: 8+
  infra: kubernetes

envs:
  # Where the sandbox SDK should create sandboxes. Point this at an API server
  # with the Sandbox feature enabled (SkyPilot Platform). Leave unset to use
  # the ambient SkyPilot config.
  SKYPILOT_API_SERVER_ENDPOINT: ""
  # Warm pool sizing: keep at least batch_size pods ready for sub-second claims.
  REWARD_POOL_NAME: rl-reward
  REWARD_POOL_REPLICAS: 8
  REWARD_EXEC_TIMEOUT: 30

file_mounts:
  /code: llm/rl-code-execution-sandbox/code

setup: |
  uv pip install skypilot fastapi uvicorn --system

run: |
  echo "Starting sandbox reward server..."
  echo "JobGroup: ${SKYPILOT_JOBGROUP_NAME}"
  echo "Reward API at http://sandbox-reward-server-0.${SKYPILOT_JOBGROUP_NAME}:8002"
  echo "Warm pool: ${REWARD_POOL_NAME} (replicas=${REWARD_POOL_REPLICAS})"

  cd /code
  python sandbox_reward_server.py \
    --port 8002 \
    --pool "${REWARD_POOL_NAME}" \
    --pool-replicas "${REWARD_POOL_REPLICAS}" \
    --exec-timeout "${REWARD_EXEC_TIMEOUT}"

---
# Replay Buffer: Stores experience tuples for training
name: replay-buffer
resources:
  cpus: 4
  memory: 16+
  infra: kubernetes

file_mounts:
  /code: llm/rl-code-execution-sandbox/code

setup: |
  uv pip install fastapi uvicorn --system

run: |
  echo "Starting replay buffer server..."
  echo "JobGroup: ${SKYPILOT_JOBGROUP_NAME}"
  echo "Replay Buffer API at http://replay-buffer-0.${SKYPILOT_JOBGROUP_NAME}:8003"

  cd /code
  python replay_buffer.py --port 8003 --capacity 10000

---
# PPO Trainer: Multi-node GRPO training
name: ppo-trainer
resources:
  accelerators: H100:1
  memory: 32+
  infra: kubernetes
num_nodes: 2

envs:
  MODEL_NAME: Qwen/Qwen2.5-0.5B-Instruct
  NUM_EPOCHS: 3
  STEPS_PER_EPOCH: 100
  BATCH_SIZE: 4
  POLICY_SYNC_INTERVAL: 10
  POLICY_SYNC_MAX_ATTEMPTS: 30
  POLICY_SYNC_RETRY_INTERVAL: 10
  ROLLOUT_SERVER_NUM_NODES: 2

file_mounts:
  /code: llm/rl-code-execution-sandbox/code

# Shared with rollout-server. The trainer saves updated weights here every
# --policy-sync-interval steps; rollout-server reloads them in place.
volumes:
  /shared/policy: rl-code-policy

setup: |
  uv pip install torch transformers accelerate httpx --system

run: |
  echo "Starting GRPO trainer..."
  echo "JobGroup: ${SKYPILOT_JOBGROUP_NAME}"
  echo "Node rank: ${SKYPILOT_NODE_RANK} / ${SKYPILOT_NUM_NODES}"

  # Service discovery via job group DNS
  # The rollout head node provides load balancing across all SGLang instances
  DATA_SERVER="data-server-0.${SKYPILOT_JOBGROUP_NAME}:8000"
  ROLLOUT_SERVER="rollout-server-0.${SKYPILOT_JOBGROUP_NAME}:30000"
  ROLLOUT_SYNC_SERVERS=""
  for i in $(seq 0 $((ROLLOUT_SERVER_NUM_NODES - 1))); do
    if [ -n "${ROLLOUT_SYNC_SERVERS}" ]; then
      ROLLOUT_SYNC_SERVERS="${ROLLOUT_SYNC_SERVERS},"
    fi
    ROLLOUT_SYNC_SERVERS="${ROLLOUT_SYNC_SERVERS}rollout-server-${i}.${SKYPILOT_JOBGROUP_NAME}:30001"
  done
  REWARD_SERVER="sandbox-reward-server-0.${SKYPILOT_JOBGROUP_NAME}:8002"
  REPLAY_BUFFER="replay-buffer-0.${SKYPILOT_JOBGROUP_NAME}:8003"

  echo "Data server: ${DATA_SERVER}"
  echo "Rollout server (load balanced): ${ROLLOUT_SERVER}"
  echo "Rollout sync servers: ${ROLLOUT_SYNC_SERVERS}"
  echo "Reward server: ${REWARD_SERVER}"
  echo "Replay buffer: ${REPLAY_BUFFER}"
  DONE_MARKER="/shared/policy/ppo-trainer-${SKYPILOT_TASK_ID}.done"

  # Wait for services to be ready
  echo "Waiting for services to be available..."
  sleep 30

  # Only run training on rank 0 (coordinator)
  if [ "${SKYPILOT_NODE_RANK}" == "0" ]; then
    echo "Starting training on coordinator node..."
    rm -f "${DONE_MARKER}"
    cd /code
    set +e
    python trainer.py \
      --data-server ${DATA_SERVER} \
      --rollout-server ${ROLLOUT_SERVER} \
      --reward-server ${REWARD_SERVER} \
      --replay-buffer ${REPLAY_BUFFER} \
      --model ${MODEL_NAME} \
      --batch-size ${BATCH_SIZE} \
      --num-epochs ${NUM_EPOCHS} \
      --steps-per-epoch ${STEPS_PER_EPOCH} \
      --policy-sync-path /shared/policy/latest \
      --policy-sync-interval ${POLICY_SYNC_INTERVAL} \
      --policy-sync-max-attempts ${POLICY_SYNC_MAX_ATTEMPTS} \
      --policy-sync-retry-interval ${POLICY_SYNC_RETRY_INTERVAL} \
      --policy-sync-servers "${ROLLOUT_SYNC_SERVERS}"
    TRAIN_EXIT=$?
    touch "${DONE_MARKER}"
    exit ${TRAIN_EXIT}
  else
    echo "Worker node ${SKYPILOT_NODE_RANK} waiting for coordinator completion"
    # In a full implementation, worker nodes would join distributed training
    # For this demo, they exit once the coordinator finishes.
    while [ ! -f "${DONE_MARKER}" ]; do
      sleep 10
    done
    echo "Coordinator finished; worker node ${SKYPILOT_NODE_RANK} exiting"
  fi
